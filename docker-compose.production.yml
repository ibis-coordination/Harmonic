# Production Docker Compose configuration
#
# Uses pre-built images from GitHub Container Registry.
# No source code or build tools needed on the server.
#
# Prerequisites:
# 1. Copy .env.example to .env and configure:
#    - DATABASE_URL (external PostgreSQL recommended)
#    - REDIS_URL (can use the included Redis or external)
#    - SECRET_KEY_BASE (generate with: ./scripts/generate-secret-key-base.sh)
#    - HOSTNAME (your domain)
#    - Other required variables (see .env.example)
#
# 2. Run: docker compose -f docker-compose.production.yml up -d
#
# For updates: docker compose -f docker-compose.production.yml pull && docker compose -f docker-compose.production.yml up -d

services:
  web:
    image: ghcr.io/ibis-coordination/harmonic:latest
    restart: unless-stopped
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
      - RAILS_SERVE_STATIC_FILES=true
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - frontend
      - backend

  sidekiq:
    image: ghcr.io/ibis-coordination/harmonic:latest
    restart: unless-stopped
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      - RAILS_ENV=production
      - RAILS_LOG_TO_STDOUT=true
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # RegenerateCaddyfileJob writes updated Caddyfile when tenants change
      - ./Caddyfile:/app/Caddyfile
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - frontend  # needed for external DNS (database hostname)
      - backend

  # Agent runner — executes AI agent tasks via Redis Streams.
  # Replaces the old in-Sidekiq agent execution path. Needs a direct internal
  # route to the Rails web container; the public reverse proxy blocks /internal/*.
  #
  # Env vars are listed explicitly (not via `env_file: .env`) to keep
  # agent-runner's blast radius small: a Node-side compromise should not
  # leak the Rails master key, Stripe backend key, DB password, etc.
  agent-runner:
    image: ghcr.io/ibis-coordination/harmonic-agent-runner:latest
    stop_grace_period: 5m
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - AGENT_RUNNER_SECRET=${AGENT_RUNNER_SECRET:?AGENT_RUNNER_SECRET must be set}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      - HARMONIC_INTERNAL_URL=http://web:3000
      - HARMONIC_HOSTNAME=${HOSTNAME:?HOSTNAME must be set}
      - LLM_GATEWAY_MODE=${LLM_GATEWAY_MODE:-litellm}
      # LLM_BASE_URL intentionally passed through only if set — empty string
      # would override agent-runner's per-mode default.
      - LLM_BASE_URL
      # Where stripe_gateway-mode calls go (defaults to http://llm-gateway:4500).
      # The runner holds no Stripe credentials — the llm-gateway service
      # resolves the payer and relays to the Stripe AI Gateway.
      - LLM_GATEWAY_URL
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-100}
      - STREAM_MAX_LEN=${STREAM_MAX_LEN:-10000}
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - frontend  # needs external access for LLM API calls
      - backend

  # LLM gateway — relays billed LLM calls to the Stripe AI Gateway, resolving
  # the payer per call via the Rails internal API. The only service that holds
  # STRIPE_GATEWAY_KEY. No published port; Caddy forwards ONLY /v1/* on
  # llm.<hostname> (the external, bearer-authenticated ingress) — the internal
  # relay path stays unreachable from outside.
  # Same image as agent-runner, different entrypoint.
  #
  # Own profile ("stripe"): it fail-fast exits without STRIPE_GATEWAY_KEY.
  # Enable via COMPOSE_PROFILES=stripe in the server .env — NOT by starting it
  # once by name (litellm-style): the gateway shares the agent-runner image and
  # must be recreated by every deploy's `up -d`. See docs/DEPLOYMENT.md.
  llm-gateway:
    image: ghcr.io/ibis-coordination/harmonic-agent-runner:latest
    command: ["node", "dist/gateway/server.js"]
    restart: unless-stopped
    profiles: ["stripe"]
    environment:
      - NODE_ENV=production
      - AGENT_RUNNER_SECRET=${AGENT_RUNNER_SECRET:?AGENT_RUNNER_SECRET must be set}
      - HARMONIC_INTERNAL_URL=http://web:3000
      - HARMONIC_HOSTNAME=${HOSTNAME:?HOSTNAME must be set}
      - HARMONIC_PRIMARY_SUBDOMAIN=${PRIMARY_SUBDOMAIN:-app}
      - STRIPE_GATEWAY_KEY
      - STRIPE_GATEWAY_BASE_URL
      # External-ingress limits (per llm_gateway API key)
      - GATEWAY_EXTERNAL_RPM
      - GATEWAY_EXTERNAL_RPD
      - GATEWAY_MAX_BODY_BYTES
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4500/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - frontend  # outbound to llm.stripe.com
      - backend   # Rails internal API; reachable by agent-runner

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - backend

  # Caddy reverse proxy for automatic HTTPS
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      HOSTNAME: "${HOSTNAME}"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile
    networks:
      - frontend

  # ClamAV virus scanner for file uploads
  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - backend

  # LiteLLM proxy for unified LLM API access (optional - enable with --profile llm)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    profiles:
      - llm
    command: ["--config", "/app/litellm_config.yaml"]
    volumes:
      - ./config/litellm_config.yaml:/app/litellm_config.yaml
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - frontend  # needs external access for API calls
      - backend

  # cAdvisor for container metrics (optional - enable with --profile monitoring)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  frontend:
  backend:
    internal: true

volumes:
  redis_data:
  caddy_data:
  caddy_config:
  clamav_data:
