# Feature Flag Definitions
#
# This file defines all available feature flags in the application.
# Flags follow a hierarchical cascade: App -> Tenant -> Collective
# A feature must be enabled at ALL higher levels to be available at a given level.
#
# Configuration options per flag:
#   name: Human-readable display name
#   description: Explanation shown in admin UIs
#   app_enabled: Whether enabled at app level (fixed, requires restart to change)
#   default_tenant: Default value for new tenants
#   default_collective: Default value for new collectives
#   collective_level: Whether this flag can be toggled per-collective (default: false)

feature_flags:
  api:
    name: "API Access"
    description: "Enables API access for programmatic integrations and AI agents"
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: true

  file_attachments:
    name: "File Attachments"
    description: "Allows users to attach files to notes, decisions, and commitments."
    app_enabled: true
    default_tenant: true
    default_collective: false
    collective_level: true

  trio:
    name: "Trio AI Assistant"
    description: "Enables the Trio AI assistant for this collective. When on, @trio mentions in this collective route to the collective's Trio agent and default automations are seeded."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: true

  internal_ai_agents:
    name: "Internal AI Agents (Task Runner)"
    description: "Enables the Harmonic-managed Task Runner for executing internal AI agent runs (the agent-runner service, automation rule dispatch, and Trio's runtime path)."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  external_ai_agents:
    name: "External AI Agents"
    description: "Allows users to create AI agents that interact with Harmonic via the API using API tokens. Requires the 'api' flag."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  automations:
    name: "Automations"
    description: "Enables the full Automations UI with YAML authoring, all trigger and action types. Existing rules continue to fire when the flag is off — only the authoring UI is gated. Agent webhooks for external AI agents are available separately without this flag."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  stripe_billing:
    name: "Stripe Billing"
    description: "Enables all Stripe billing: account subscriptions and AI Agent usage metering via AI Gateway. Required for harmonic.social; not needed for self-hosted instances."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  llm_gateway:
    name: "LLM Gateway External Access"
    description: "Allows the tenant's external agents to call the LLM gateway directly with their llm_gateway API keys, billed to their pool or billing customer. Requires Stripe billing."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  vote_receipt_emails:
    name: "Vote Receipt Emails"
    description: "Allows voters to opt in to receiving email receipts when they vote"
    app_enabled: true
    default_tenant: true
    default_collective: true
    collective_level: true

  collective_export:
    name: "Collective Data Export"
    description: "Allows collective admins to export their collective's data as a ZIP. Disabled by default pending privacy policy + member-notification work."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  user_data_export:
    name: "Per-User Data Export"
    description: "Allows individual users to download a ZIP of their own data (GDPR Article 20 portability). Disabled by default pending privacy policy and rollout."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  # service_worker and web_push are separate flags because they answer
  # different questions (client-infrastructure kill switch vs. push policy),
  # but push physically depends on the service worker — web push is only
  # available when BOTH are on. See Tenant#web_push_available? and
  # docs/ARCHITECTURE.md "Service worker & Web Push".
  service_worker:
    name: "Service Worker"
    description: "Installs a service worker for instant cold opens and an offline fallback page. Doubles as the kill switch: turning this off makes installed service workers uninstall themselves on their next update check — which also destroys their push subscriptions, so this flag off means Web Push off."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  web_push:
    name: "Web Push Notifications"
    description: "Delivers notifications to users' devices via Web Push (through third-party push services: FCM, Mozilla, Apple). Users opt in per device from their settings page; per-type channel preferences control which notifications push. Requires the Service Worker flag (push runs inside the service worker) and server VAPID keys."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: false

  funding_pools:
    name: "Funding Pools"
    description: "Allows this collective to open a funding pool: enrolled members' prepaid balances fund the collective's agents, one random member billed per call. Operator-managed — enabled per collective by a platform admin, never self-serve from collective settings. Requires stripe_billing on the tenant to do anything."
    app_enabled: true
    default_tenant: false
    default_collective: false
    collective_level: true
    operator_managed: true
