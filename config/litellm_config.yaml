model_list:
  # Default: Arcee's trinity-large-thinking via their OpenAI-compatible API
  # (requires ARCEE_API_KEY env var). LiteLLM routes OpenAI-compatible
  # endpoints through the `openai/` provider prefix + api_base.
  - model_name: default
    litellm_params:
      model: openai/trinity-large-thinking
      api_base: https://api.arcee.ai/api/v1
      api_key: os.environ/ARCEE_API_KEY

  - model_name: trinity-large-thinking
    litellm_params:
      model: openai/trinity-large-thinking
      api_base: https://api.arcee.ai/api/v1
      api_key: os.environ/ARCEE_API_KEY

  - model_name: trinity-large-thinking-free
    litellm_params:
      model: openrouter/arcee-ai/trinity-large-thinking:free
      api_key: os.environ/OPENROUTER_API_KEY

  # Anthropic Claude (requires ANTHROPIC_API_KEY env var).
  # LiteLLM requires the `anthropic/` provider prefix on the underlying model.
  - model_name: claude-sonnet-4
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  # Optional: OpenAI (requires OPENAI_API_KEY env var)
  - model_name: gpt-4o
    litellm_params:
      model: gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # Local Ollama models (via host.docker.internal)
  # Use ollama_chat/ prefix for proper chat API support
  - model_name: deepseek-r1
    litellm_params:
      model: ollama_chat/deepseek-r1:latest
      api_base: http://host.docker.internal:11434

  - model_name: gemma3
    litellm_params:
      model: ollama_chat/gemma3:4b
      api_base: http://host.docker.internal:11434

  - model_name: llama3
    litellm_params:
      model: ollama_chat/llama3:latest
      api_base: http://host.docker.internal:11434
