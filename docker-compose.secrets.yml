# Overlay that switches secret INJECTION from env vars to file-mounted secrets.
#
#   docker compose -f docker-compose.production.yml -f docker-compose.secrets.yml up -d
#
# Each secret is read from ./secrets/run/<NAME> — one 0600 file per secret,
# gitignored and operator-populated (pre-placed by hand, or written by an
# optional populate hook; see scripts/deploy.sh and docs/INFRASTRUCTURE.md).
# No secret material lives in this repo. Compose mounts each into
# /run/secrets/<NAME> (tmpfs) inside only the services that list it —
# preserving the existing blast-radius design.
# config/initializers/00_file_secrets.rb reads them.
#
# SCOPE — only secrets that Rails reads AFTER initializers run can move here.
# Anything consumed earlier is out (for now) and stays on the legacy .env path:
#   - POSTGRES_*, SMTP_*, REDIS_URL: read in config/environments/production.rb
#     or database.yml ERB, which load BEFORE config/initializers/*. The file
#     would be read too late. Moving these needs an entrypoint export instead —
#     see "Boot-ordering caveat" in docs/INFRASTRUCTURE.md.
#   - REDIS_PASSWORD, agent-runner's AGENT_RUNNER_SECRET: interpolated by
#     compose itself (${VAR:?...} in docker-compose.production.yml), so they
#     must exist in the host env / .env regardless; a container file mount
#     cannot satisfy compose interpolation. (agent-runner is Node and reads
#     process.env directly — file-secrets for it also needs an entrypoint
#     export; deferred with the rest.)
#
# MIGRATION NOTE — compose errors if a declared secret's source file is
# missing, so when this overlay is enabled EVERY file below must exist.
# To migrate one secret at a time, create the full set and leave a file EMPTY
# for any secret staying on .env: the initializer ignores empty files, so the
# env var still wins.
#
# This is presented as an OVERLAY rather than edited into the live production
# compose so the env-var path keeps working unchanged until the team opts in.
# Once validated, fold these blocks into docker-compose.production.yml and drop
# the corresponding keys from `.env`.

secrets:
  DO_SPACES_SECRET_ACCESS_KEY: { file: ./secrets/run/DO_SPACES_SECRET_ACCESS_KEY }
  STRIPE_API_KEY:              { file: ./secrets/run/STRIPE_API_KEY }
  STRIPE_WEBHOOK_SECRET:       { file: ./secrets/run/STRIPE_WEBHOOK_SECRET }
  GITHUB_CLIENT_SECRET:        { file: ./secrets/run/GITHUB_CLIENT_SECRET }
  TURNSTILE_SECRET_KEY:        { file: ./secrets/run/TURNSTILE_SECRET_KEY }
  AGENT_RUNNER_SECRET:         { file: ./secrets/run/AGENT_RUNNER_SECRET }

services:
  web:
    secrets:
      - DO_SPACES_SECRET_ACCESS_KEY
      - STRIPE_API_KEY
      - STRIPE_WEBHOOK_SECRET
      - GITHUB_CLIENT_SECRET
      - TURNSTILE_SECRET_KEY
      - AGENT_RUNNER_SECRET  # Rails side: agent_runner_crypto / internal auth

  # sidekiq gets only what background jobs touch: ActiveStorage (Spaces) and
  # Stripe API calls. OAuth / Turnstile / webhook verification are web-only.
  sidekiq:
    secrets:
      - DO_SPACES_SECRET_ACCESS_KEY
      - STRIPE_API_KEY
