# Overlay that switches secret INJECTION from env vars to file-mounted secrets.
#
#   docker compose -f docker-compose.production.yml -f docker-compose.secrets.yml up -d
#
# scripts/deploy.sh writes one file per secret into ./secrets/decrypted/<NAME>
# (gitignored, 0600) by decrypting secrets/secrets.enc.env with SOPS. Compose
# mounts each into /run/secrets/<NAME> (tmpfs) inside only the services that
# list it — preserving the existing blast-radius design (agent-runner still
# sees a minimal set). config/initializers/00_file_secrets.rb reads them.
#
# This is presented as an OVERLAY rather than edited into the live production
# compose so the env-var path keeps working unchanged until the team opts in.
# Once validated, fold these blocks into docker-compose.production.yml and drop
# the corresponding keys from `.env`.

secrets:
  DATABASE_URL:           { file: ./secrets/decrypted/DATABASE_URL }
  REDIS_PASSWORD:         { file: ./secrets/decrypted/REDIS_PASSWORD }
  DO_SPACES_SECRET_ACCESS_KEY: { file: ./secrets/decrypted/DO_SPACES_SECRET_ACCESS_KEY }
  SMTP_PASSWORD:          { file: ./secrets/decrypted/SMTP_PASSWORD }
  STRIPE_API_KEY:         { file: ./secrets/decrypted/STRIPE_API_KEY }
  STRIPE_WEBHOOK_SECRET:  { file: ./secrets/decrypted/STRIPE_WEBHOOK_SECRET }
  GITHUB_CLIENT_SECRET:   { file: ./secrets/decrypted/GITHUB_CLIENT_SECRET }
  AGENT_RUNNER_SECRET:    { file: ./secrets/decrypted/AGENT_RUNNER_SECRET }

services:
  web:
    secrets:
      - DATABASE_URL
      - REDIS_PASSWORD
      - DO_SPACES_SECRET_ACCESS_KEY
      - SMTP_PASSWORD
      - STRIPE_API_KEY
      - STRIPE_WEBHOOK_SECRET
      - GITHUB_CLIENT_SECRET
      - AGENT_RUNNER_SECRET

  sidekiq:
    secrets:
      - DATABASE_URL
      - REDIS_PASSWORD
      - DO_SPACES_SECRET_ACCESS_KEY
      - SMTP_PASSWORD
      - STRIPE_API_KEY
      - STRIPE_WEBHOOK_SECRET

  # agent-runner keeps its deliberately small footprint: only the two secrets
  # it actually needs. It reads env directly (Node, not Rails), so these are
  # consumed via the compose `secrets` -> entrypoint export, see infra doc.
  agent-runner:
    secrets:
      - AGENT_RUNNER_SECRET
      - REDIS_PASSWORD
