name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the Docker image (e.g., v1.0.0 or latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase — github.repository preserves case ("Harmonic")
  # but Docker tags must be lowercase.
  IMAGE_NAME: ibis-coordination/harmonic
  AGENT_RUNNER_IMAGE_NAME: ibis-coordination/harmonic-agent-runner

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Rails (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.sha }}
          cache-from: type=gha,scope=rails-amd64
          cache-to: type=gha,mode=max,scope=rails-amd64
          platforms: linux/amd64

      - name: Build and push agent-runner (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./agent-runner
          file: ./agent-runner/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.AGENT_RUNNER_IMAGE_NAME }}:amd64-${{ github.sha }}
          cache-from: type=gha,scope=agent-runner-amd64
          cache-to: type=gha,mode=max,scope=agent-runner-amd64
          platforms: linux/amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Rails (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.sha }}
          cache-from: type=gha,scope=rails-arm64
          cache-to: type=gha,mode=max,scope=rails-arm64
          platforms: linux/arm64

      - name: Build and push agent-runner (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./agent-runner
          file: ./agent-runner/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.AGENT_RUNNER_IMAGE_NAME }}:arm64-${{ github.sha }}
          cache-from: type=gha,scope=agent-runner-arm64
          cache-to: type=gha,mode=max,scope=agent-runner-arm64
          platforms: linux/arm64

  merge-manifests:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker (Rails)
        id: meta_rails
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Extract metadata for Docker (agent-runner)
        id: meta_agent_runner
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AGENT_RUNNER_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create and push Rails multi-arch manifest
        id: rails_manifest
        run: |
          TAGS=$(echo "${{ steps.meta_rails.outputs.tags }}" | tr '\n' ' ')
          FIRST_TAG=""
          for TAG in $TAGS; do
            docker buildx imagetools create \
              --tag "$TAG" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.sha }}" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.sha }}"
            if [ -z "$FIRST_TAG" ]; then
              FIRST_TAG="$TAG"
            fi
          done
          DIGEST=$(docker buildx imagetools inspect "$FIRST_TAG" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Create and push agent-runner multi-arch manifest
        id: agent_runner_manifest
        run: |
          TAGS=$(echo "${{ steps.meta_agent_runner.outputs.tags }}" | tr '\n' ' ')
          FIRST_TAG=""
          for TAG in $TAGS; do
            docker buildx imagetools create \
              --tag "$TAG" \
              "${{ env.REGISTRY }}/${{ env.AGENT_RUNNER_IMAGE_NAME }}:amd64-${{ github.sha }}" \
              "${{ env.REGISTRY }}/${{ env.AGENT_RUNNER_IMAGE_NAME }}:arm64-${{ github.sha }}"
            if [ -z "$FIRST_TAG" ]; then
              FIRST_TAG="$TAG"
            fi
          done
          DIGEST=$(docker buildx imagetools inspect "$FIRST_TAG" --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestation (Rails)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.rails_manifest.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (agent-runner)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.AGENT_RUNNER_IMAGE_NAME }}
          subject-digest: ${{ steps.agent_runner_manifest.outputs.digest }}
          push-to-registry: true
