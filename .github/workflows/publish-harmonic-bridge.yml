name: Publish harmonic-bridge to npm

on:
  push:
    tags:
      - 'bridge-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: harmonic-bridge
        run: npm ci

      - name: Verify package.json version matches tag
        if: startsWith(github.ref, 'refs/tags/bridge-v')
        working-directory: harmonic-bridge
        run: |
          # Tag format: bridge-vX.Y.Z → expected pkg version: X.Y.Z
          TAG_VERSION="${GITHUB_REF_NAME#bridge-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Typecheck
        working-directory: harmonic-bridge
        run: npm run typecheck

      - name: Test
        working-directory: harmonic-bridge
        run: npm test

      - name: Build
        working-directory: harmonic-bridge
        run: npm run build

      - name: Publish to npm
        working-directory: harmonic-bridge
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
